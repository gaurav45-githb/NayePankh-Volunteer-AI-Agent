<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NayePankh AI Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="chat-container">

        <!-- Header -->

        <div class="header">

            <h3>🤖 NayePankh AI Assistant</h3>

            <p>
                Helping students discover internships,
                volunteer opportunities and career paths.
            </p>

        </div>

        <!-- Chat Area -->

        <div class="chat-box">

            <div class="text-center mb-5">

                <h2>How can I help you today?</h2>

            </div>

            <!-- Quick Action Cards -->

            <div class="row g-3 mb-5">

                <div class="col-md-6">

                    <form action="/internship" method="POST">

                        <button type="submit" class="card suggestion-card p-3 w-100 text-start">

                            🚀 Find Best Internship For Me

                        </button>

                    </form>

                </div>

                <div class="col-md-6">

                    <form action="/volunteer" method="POST">

                        <button type="submit" class="card suggestion-card p-3 w-100 text-start">

                            🤝 Find Volunteer Opportunities

                        </button>

                    </form>

                </div>

                <div class="col-md-6">

                    <form action="/roadmap" method="POST">

                        <button type="submit" class="card suggestion-card p-3 w-100 text-start">

                            📚 Generate Career Roadmap

                        </button>

                    </form>

                </div>

                <div class="col-md-6">

                    <form action="/chat" method="POST">

                        <input type="hidden" name="message" value="Tell me about NayePankh Foundation">

                        <button type="submit" class="card suggestion-card p-3 w-100 text-start">

                            ℹ️ Ask About NayePankh Foundation

                        </button>

                    </form>

                </div>

            </div>

            {% if user_message %}
            <div class="message user">
                {{ user_message }}
            </div>
            {% endif %}

            {% if ai_response %}
            <div class="message bot">
                {{ ai_response | safe }}
            </div>

            {% endif %}

        </div>

        <!-- Input Area -->

        <div class="input-area">

            <form action="/chat" method="POST">

                <div class="input-group">

                    <input type="text" name="message" class="form-control" placeholder="Ask anything..." required>

                    <button class="btn btn-primary" type="submit">

                        Send

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
